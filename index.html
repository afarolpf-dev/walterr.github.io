<!DOCTYPE html>
<html>
<head>
  <title>Türkiye Vatandaşlık Bilgi Sorgulama</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Türkiye Vatandaşlık Bilgi Sorgulama</h1>

    <div class="form-group">
      <label for="tcKimlik">TC Kimlik Numarası:</label>
      <input type="text" id="tcKimlik" name="tcKimlik" required>
    </div>

    <div class="form-group">
      <label for="dogumTarihi">Doğum Tarihi (GG/AA/YYYY):</label>
      <input type="date" id="dogumTarihi" name="dogumTarihi" required>
    </div>

    <div class="form-group">
      <label for="guvenlikKodu">Güvenlik Kodu:</label>
      <input type="text" id="guvenlikKodu" name="guvenlikKodu" required>
    </div>

    <button onclick="sorgula()">Bilgileri Sorgula</button>

    <div id="sonuclar" class="sonuclar">
      <!-- Sonuçlar buraya gelecek -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
